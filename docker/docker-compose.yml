name: freezer-lego-meals

services:
  redis:
    image: redis:7.4-alpine
    container_name: freezer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ../data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - freezer-infra

  redisinsight:
    image: redis/redisinsight:latest
    container_name: freezer-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    networks:
      - freezer-infra

  chromadb:
    image: chromadb/chroma:latest
    container_name: freezer-chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "${CHROMADB_PORT:-8001}:8000"
    volumes:
      - ../data/chromadb:/chroma/chroma
    healthcheck:
      test:
        - CMD-SHELL
        - grep -q ':1F40' /proc/net/tcp /proc/net/tcp6
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - freezer-infra

networks:
  freezer-infra:
    driver: bridge
